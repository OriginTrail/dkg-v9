name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests (Vitest packages)
        run: pnpm turbo test --filter='!@origintrail-official/dkg-evm-module'

  solidity:
    name: Solidity (Compile & Test)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Hardhat artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/evm-module/artifacts
            packages/evm-module/cache
            packages/evm-module/typechain
          key: hardhat-${{ runner.os }}-${{ hashFiles('packages/evm-module/contracts/**/*.sol', 'packages/evm-module/hardhat.node.config.ts') }}
          restore-keys: |
            hardhat-${{ runner.os }}-

      - name: Compile contracts
        run: npx hardhat compile --config hardhat.node.config.ts
        working-directory: packages/evm-module

      - name: Run Hardhat tests
        run: node scripts/run-tests.js
        working-directory: packages/evm-module
