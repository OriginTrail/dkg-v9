name: CI

on:
  push:
    branches: [main, v10-rc, 'test/**']
  pull_request:
    branches: [main, v10-rc]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tornado-tests:
    name: "Tornado: Protocol Core Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: "Core — crypto, protocol wire, genesis (442 tests)"
        run: pnpm --filter @origintrail-official/dkg-core test:coverage

      - name: "Storage — triple store operations (78 tests)"
        run: pnpm --filter @origintrail-official/dkg-storage test:coverage

      - name: "Chain — chain adapters, staking (102 tests)"
        run: pnpm --filter @origintrail-official/dkg-chain test:coverage

      - name: "Publisher — merkle, ACK, V10 publish (666 tests)"
        run: pnpm --filter @origintrail-official/dkg-publisher test:coverage

      - name: "Agent — gossip, workspace, integration (277 tests)"
        run: pnpm --filter @origintrail-official/dkg-agent test:coverage

  solidity:
    name: Solidity (Compile & Test)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Hardhat artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/evm-module/artifacts
            packages/evm-module/cache
            packages/evm-module/typechain
          key: hardhat-${{ runner.os }}-${{ hashFiles('packages/evm-module/contracts/**/*.sol', 'packages/evm-module/hardhat.node.config.ts') }}
          restore-keys: |
            hardhat-${{ runner.os }}-

      - name: Compile contracts
        run: npx hardhat compile --config hardhat.node.config.ts
        working-directory: packages/evm-module

      - name: Hardhat tests + Solidity coverage + ratchet check
        run: pnpm test:coverage
        working-directory: packages/evm-module
        env:
          NODE_OPTIONS: --max-old-space-size=8192
