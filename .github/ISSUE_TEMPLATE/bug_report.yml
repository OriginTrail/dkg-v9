name: Bug Report
description: Report a bug in DKG V9
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Run `dkg init`
        2. Run `dkg start`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DKG Version
      description: Output of `dkg status` or the version from package.json.
      placeholder: "9.0.0-beta.2"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.2 / Ubuntu 24.04"
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "22.x"
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant logs from `dkg logs`.
      render: text
