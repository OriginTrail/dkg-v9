# Automatically publish all public packages to NPM on every push to the
# release branch. Uses a dev pre-release suffix so each push gets a unique
# version (e.g. 10.0.0-rc.1-dev.1774300000.abc1234) tagged as `latest`.
#
# To switch the release branch: change the branches list below.
# To disable: remove the NPM_TOKEN secret from the repo settings.

name: Continuous NPM Publish

on:
  push:
    branches: [main]  # ← change this when the release branch moves

permissions:
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run when CI passes (this job depends on the CI workflow via branch protection).
    # Skip if the commit message is a version bump from this workflow.
    if: "!startsWith(github.event.head_commit.message, 'chore: continuous publish')"
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build Vite UI bundles (node-ui)
        # `build` was split from full (tsc + vite) into tsc-only in CI for a
        # ~2 min wall-clock reduction (see ci.yml). Dev pre-releases still
        # need the Vite-produced `dist-ui/` bundles shipped to npm, so
        # rebuild them here before publishing.
        run: pnpm turbo run build:ui

      # NOTE: tests are intentionally NOT re-run here. The main `ci.yml`
      # workflow runs the full TORNADO / BURA / KOSAVA matrix in parallel on
      # the same commit and is the authoritative test gate (enforced via
      # branch protection on merges to v10-rc). Re-running `pnpm turbo test`
      # in this publish workflow was redundant with `ci.yml` AND
      # incompatible with the `accept-red-ci` policy on v10-rc: a
      # deliberately-red PROD-BUG sentinel test (e.g. network-sim
      # K-4/K-5 — no seeded RNG, no libp2p-parity harness) would fail
      # this step and block every dev pre-release, even though CI was
      # already reporting the same red state as documented bug evidence.

      - name: Compute dev version suffix
        id: version
        run: |
          EPOCH=$(date +%s)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "SUFFIX=dev.${EPOCH}.${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Bump all public packages to dev pre-release
        run: |
          SUFFIX="${{ steps.version.outputs.SUFFIX }}"
          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkgsDir = path.join(process.cwd(), 'packages');
            for (const dir of fs.readdirSync(pkgsDir)) {
              const pkgPath = path.join(pkgsDir, dir, 'package.json');
              if (!fs.existsSync(pkgPath)) continue;
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf-8'));
              if (pkg.private) continue;
              const base = pkg.version.replace(/-dev\\..*$/, '');
              pkg.version = base + '-' + '${SUFFIX}';
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              console.log(pkg.name + '@' + pkg.version);
            }
          "

      - name: Publish all public packages
        if: env.HAS_NPM_TOKEN == 'true'
        run: pnpm -r publish --no-git-checks --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
